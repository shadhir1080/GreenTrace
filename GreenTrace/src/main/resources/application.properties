# Spring Boot
spring.application.name=greentrace

# Server
server.port=${PORT:8080}

# Database Configuration (Defaults to H2 in-memory, overrides dynamically on Railway)
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:h2:mem:greentrace_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${SUPABASE_DB_USER:${PGUSER:sa}}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${SUPABASE_DB_PASSWORD:${PGPASSWORD:}}}

# JPA / Hibernate (Automatic Dialect detection)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:false}

# JWT
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration-ms=86400000

# Logging
logging.level.com.greentrace=DEBUG
logging.level.org.springframework.security=WARN
