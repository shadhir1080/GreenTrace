# Spring Boot
spring.application.name=greentrace

# Server
server.port=8080

# Supabase / PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://${SUPABASE_DB_HOST:localhost}:5432/${SUPABASE_DB_NAME:postgres}
spring.datasource.username=${SUPABASE_DB_USER:postgres}
spring.datasource.password=${SUPABASE_DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (Disabled for production/Supabase)
spring.h2.console.enabled=false

# JWT
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration-ms=86400000

# Logging
logging.level.com.greentrace=DEBUG
logging.level.org.springframework.security=WARN
